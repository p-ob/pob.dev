
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # CI only ever installs exact versions already pinned (and reviewed)
      # in package-lock.json, so the cooldown in .npmrc has nothing to
      # protect here - it only exists to stop *new* installs from grabbing
      # an unreviewed version. `npm audit signatures` re-resolves each
      # locked package against the registry and, without this override,
      # errors out (ETARGET) whenever a pinned dependency happens to have
      # been published within the cooldown window.
      NPM_CONFIG_MIN_RELEASE_AGE: '0'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Update npm
        # Node 24's bundled npm lags behind the required v12 (see package.json engines).
        run: npm install -g npm@12

      - name: Install Dependencies
        run: npm ci

      - name: Audit Dependencies
        run: npm audit --audit-level=high

      - name: Verify Registry Signatures
        run: npm audit signatures

      - name: Build Site
        run: npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Update npm
        # Node 24's bundled npm lags behind the required v12 (see package.json engines).
        run: npm install -g npm@12

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fix Git Safe Directory
        # Running inside a container job leaves the checkout owned by a
        # different uid than the container's default user, so git refuses
        # to operate on it (used by src/_data/metadata.js at build time).
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Update npm
        # Node 24's bundled npm lags behind the required v12 (see package.json engines).
        run: npm install -g npm@12

      - name: Install Dependencies
        run: npm ci

      - name: Build Site
        # Playwright's webServer runs `npm start` (eleventy --watch --serve),
        # which builds HTML but not the PageFind index -- that's a separate
        # `build:index` step only wired into `npm run build`. Without this,
        # /pagefind/pagefind-component-ui.js 404s and any test touching the
        # search box hangs waiting for <pagefind-input> to upgrade. A prior
        # full build leaves public/pagefind/ in place for `npm start` to
        # serve alongside its own (re-)build of the HTML.
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npm test
        env:
          CI: true

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    name: Deploy
    needs: [build, unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Update npm
        # Node 24's bundled npm lags behind the required v12 (see package.json engines).
        run: npm install -g npm@12

      - name: Install Dependencies
        run: npm ci

      - name: Rebuild Site
        run: npm run build
        env:
          # Production is the one build that should actually fetch the
          # external RSS feeds for the Reading page; every other build in
          # this workflow leaves external feed fetching off by default.
          FETCH_EXTERNAL_FEEDS: true

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
